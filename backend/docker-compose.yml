version: '3.8'

services:
  fusionrag-webhook:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - WEBHOOK_API_KEY=${WEBHOOK_API_KEY}
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      # Mount the current directory for development
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a simple test service
  test:
    build: .
    depends_on:
      - fusionrag-webhook
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - WEBHOOK_API_KEY=${WEBHOOK_API_KEY}
    command: ["python", "test_webhook.py"]
    profiles:
      - test
